name: Docker Cleanup - Scheduled Maintenance

on:
  schedule:
    # Run every Sunday at 2 AM UTC (adjust as needed)
    - cron: '0 2 * * 0'

    # Also run daily at 3 AM UTC if you want more frequent cleanup
    # - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      deep_clean:
        description: 'Perform deep clean (removes ALL unused resources)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run - only show what would be cleaned'
        required: false
        type: boolean
        default: false

jobs:
  cleanup:
    runs-on: self-hosted
    name: Docker System Cleanup

    steps:
      - name: Initial system check
        run: |
          echo "🔍 Docker Cleanup Job Started"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""

          # Show current system status
          echo "📊 Current System Status:"
          echo "========================"

          # Disk usage
          echo "Disk Usage:"
          df -h /
          echo ""

          # Docker disk usage
          echo "Docker Disk Usage:"
          docker system df
          echo ""

          # Count of various Docker objects
          echo "Docker Objects Count:"
          echo "- Containers: $(docker ps -aq | wc -l) total ($(docker ps -q | wc -l) running)"
          echo "- Images: $(docker images -q | wc -l)"
          echo "- Volumes: $(docker volume ls -q | wc -l)"
          echo "- Networks: $(docker network ls -q | wc -l)"

          # Check disk usage percentage
          USAGE=$(df / | awk 'NR==2 {print $5}' | sed 's/%//')
          echo ""
          echo "Current disk usage: ${USAGE}%"

          # Set alert levels
          if [ $USAGE -gt 90 ]; then
            echo "::error::CRITICAL: Disk usage is at ${USAGE}%!"
            echo "🚨 CRITICAL DISK USAGE DETECTED!"
          elif [ $USAGE -gt 80 ]; then
            echo "::warning::High disk usage detected: ${USAGE}%"
            echo "⚠️ HIGH DISK USAGE - Aggressive cleanup recommended"
          elif [ $USAGE -gt 70 ]; then
            echo "::warning::Moderate disk usage: ${USAGE}%"
            echo "📊 Moderate disk usage - Standard cleanup proceeding"
          else
            echo "✅ Disk usage is healthy at ${USAGE}%"
          fi

      - name: Standard cleanup (7+ days old)
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "🧹 Starting Standard Cleanup (7+ days old resources)"
          echo "=================================================="

          # Track initial state
          INITIAL_USAGE=$(df / | awk 'NR==2 {print $5}' | sed 's/%//')
          INITIAL_DOCKER_SIZE=$(docker system df --format "table {{.Size}}" | tail -n +2 | awk '{sum+=$1} END {print sum}')

          # Remove stopped containers older than 7 days
          echo "Removing stopped containers older than 7 days..."
          docker container prune -f --filter "until=168h" || true

          # Remove unused images older than 7 days
          echo "Removing unused images older than 7 days..."
          docker image prune -af --filter "until=168h" || true

          # Remove unused volumes (be careful with this!)
          echo "Removing unused volumes..."
          docker volume prune -f || true

          # Remove unused networks
          echo "Removing unused networks..."
          docker network prune -f || true

          # Remove build cache older than 7 days
          echo "Removing build cache older than 7 days..."
          docker builder prune -af --filter "until=168h" --keep-storage=2GB || true

          # Show results
          FINAL_USAGE=$(df / | awk 'NR==2 {print $5}' | sed 's/%//')
          echo ""
          echo "✅ Standard cleanup completed"
          echo "Disk usage: ${INITIAL_USAGE}% → ${FINAL_USAGE}%"

      - name: Aggressive cleanup (24+ hours old)
        if: github.event.inputs.dry_run != 'true'
        run: |
          # Check if aggressive cleanup is needed
          CURRENT_USAGE=$(df / | awk 'NR==2 {print $5}' | sed 's/%//')

          if [ $CURRENT_USAGE -gt 75 ] || [ "${{ github.event.inputs.deep_clean }}" = "true" ]; then
            echo "🔥 Starting Aggressive Cleanup (24+ hours old resources)"
            echo "======================================================"

            # More aggressive cleanup for high disk usage
            echo "Removing ALL unused images older than 24 hours..."
            docker image prune -af --filter "until=24h" || true

            # Remove ALL build cache older than 24 hours
            echo "Removing ALL build cache older than 24 hours..."
            docker builder prune -af --filter "until=24h" || true

            # System-wide prune for resources older than 24 hours
            echo "System-wide prune of resources older than 24 hours..."
            docker system prune -af --volumes --filter "until=24h" || true

            echo "✅ Aggressive cleanup completed"
          else
            echo "ℹ️ Aggressive cleanup skipped (disk usage is ${CURRENT_USAGE}%)"
          fi

      - name: Deep clean (if requested)
        if: github.event.inputs.deep_clean == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          echo "🚨 DEEP CLEAN MODE ACTIVATED"
          echo "============================"
          echo "⚠️  WARNING: This will remove ALL unused Docker resources!"
          echo ""

          # Nuclear option - remove everything unused
          echo "Removing ALL unused containers..."
          docker container prune -f || true

          echo "Removing ALL unused images..."
          docker image prune -af || true

          echo "Removing ALL build cache..."
          docker builder prune --all -f || true

          echo "Removing ALL unused volumes..."
          docker volume prune -f || true

          echo "Full system prune..."
          docker system prune -af --volumes || true

          echo "✅ Deep clean completed"

      - name: Cleanup old GitHub Actions caches
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "🗑️ Cleaning up old build artifacts"
          echo "================================="

          # Clean up old tar.gz files in common locations
          find /tmp -name "*.tar.gz" -type f -mtime +7 -delete 2>/dev/null || true
          find /home/runner -name "*.tar.gz" -type f -mtime +7 -delete 2>/dev/null || true
          find /home/ec2-user -name "*.tar.gz" -type f -mtime +7 -delete 2>/dev/null || true

          # Clean up old backup directories
          find /home -name "backup_*" -type d -mtime +30 -exec rm -rf {} + 2>/dev/null || true

          echo "✅ Old artifacts cleaned up"

      - name: Final system report
        if: always()
        run: |
          echo "📊 Final System Report"
          echo "===================="

          # Show final disk usage
          echo "Final Disk Usage:"
          df -h /
          echo ""

          # Show Docker disk usage
          echo "Docker System Status:"
          docker system df
          echo ""

          # Final disk percentage
          FINAL_USAGE=$(df / | awk 'NR==2 {print $5}' | sed 's/%//')

          # Create summary based on results
          if [ $FINAL_USAGE -gt 80 ]; then
            echo "::error::Disk usage is still high at ${FINAL_USAGE}% after cleanup"
            echo "🚨 ATTENTION REQUIRED: Disk usage remains high!"
            echo "Recommended actions:"
            echo "1. Check for large log files: du -h /var/log/* | sort -rh | head -20"
            echo "2. Check for large containers: docker ps -as"
            echo "3. Consider increasing disk size"
            echo "4. Review retention policies"
          elif [ $FINAL_USAGE -gt 70 ]; then
            echo "::warning::Disk usage is ${FINAL_USAGE}% after cleanup"
            echo "⚠️ Monitor disk usage - currently at ${FINAL_USAGE}%"
          else
            echo "✅ Disk usage is healthy at ${FINAL_USAGE}%"
          fi

          # Generate summary for GitHub
          echo "## 🧹 Docker Cleanup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Execution Time**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Final Disk Usage**: ${FINAL_USAGE}%" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event.inputs.deep_clean }}" = "true" ]; then
            echo "- **Mode**: Deep Clean 🔥" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Mode**: Standard Cleanup" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Disk Usage" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          df -h / | head -2 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Send alert if critical
        if: failure() || cancelled()
        run: |
          echo "🚨 Docker Cleanup Job Failed or was Cancelled"
          echo "Manual intervention may be required to free disk space"
          echo "Check the self-hosted runner immediately!"